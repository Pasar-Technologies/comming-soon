<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Ad - Pasar</title>
  <meta name="description" content="Check out this ad on Pasar - your local marketplace">
  <script>
    var path = window.location.pathname;

    if (!path.startsWith('/ad/')) {
      // Not a deep link — redirect to home
      window.location.href = '/';
    }
    // If it IS a deep link (/ad/*), just show the fallback page.
    // On Android/iOS with the app installed, the OS intercepts
    // the https:// URL BEFORE this page ever loads.
    // If we're here, the app is NOT installed — show Play Store link.
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
    p { font-size: 15px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #6200EE;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
    }
    .btn:hover { background: #5000CC; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒</div>
    <h1>View this ad on Pasar</h1>
    <p>Install the Pasar app to view this ad and discover local services near you.</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.pasar.app">
      Get Pasar on Google Play
    </a>
  </div>
</body>
</html>
